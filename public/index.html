    <!-- ── JSON-LD Structured Data ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Teticoin",
      "url": "https://teticoin.com",
      "logo": "https://teticoin.com/favicon.png",
      "description": "Real-time participant engagement tool for trainers, teachers, and facilitators. Award points live, show scoreboards, and keep participants hooked — no app needed.",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free Plan",
          "price": "0",
          "priceCurrency": "MYR",
          "description": "3 active sessions, up to 30 participants"
        },
        {
          "@type": "Offer",
          "name": "Pro Plan",
          "price": "29",
          "priceCurrency": "MYR",
          "billingIncrement": "P1M",
          "description": "Unlimited sessions, up to 200 participants, groups, custom labels"
        }
      ],
      "author": {
        "@type": "Organization",
        "name": "Tetikus",
        "url": "https://www.tetikus.com.my",
        "email": "hi.tetikus@gmail.com",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "MY"
        }
      },
      "featureList": [
        "Live coin awarding",
        "Real-time scoreboard",
        "QR code participant join",
        "Group and team scoring",
        "Custom coin labels",
        "Session history and CSV export",
        "Projector / TV mode",
        "No app required for participants"
      ],
      "screenshot": "https://teticoin.com/og-image.png",
      "inLanguage": ["en", "ms"]
    }
    </script>

    <!-- ── FAQ Structured Data (helps Google show rich results) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do participants need to download an app to join?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Participants join via a QR code or link on any device — no download or account required."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Teticoin cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Teticoin has a free plan (3 sessions, 30 participants) and a Pro plan at RM 29/month or RM 269/year. Enterprise pricing is available for teams."
          }
        },
        {
          "@type": "Question",
          "name": "What types of sessions is Teticoin suitable for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Teticoin works for corporate training, workshops, classrooms, team meetings, and live events — both online and in-person."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use Teticoin for group or team scoring?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Pro plan includes group and team scoring, allowing you to award points to entire teams at once and display group rankings on the scoreboard."
          }
        }
      ]
    }
    </script>
